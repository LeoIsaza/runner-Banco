name: Karate Feature Generator & Runner

run-name: Karate Generator - ${{ github.event.inputs.branch }}

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: 'Git repository URL'
        required: true
        default: 'https://github.com/user/repo.git'

      branch:
        description: 'Branch to clone'
        required: true
        default: 'main'

      curl_request:
        description: 'Curl o request de Postman'
        required: true

      karate_env:
        description: 'Ambiente de ejecución'
        required: true
        default: 'qa'

      run_tests:
        description: 'Ejecutar pruebas'
        required: true
        default: true
        type: boolean

      commit_results:
        description: 'Commit y push'
        required: true
        default: true
        type: boolean

jobs:
  generate-and-run:
    runs-on: ubuntu-latest

    steps:

      #################################################################
      # Checkout repo del pipeline
      #################################################################

      - name: Checkout Pipeline Repository
        uses: actions/checkout@v4

      #################################################################
      # Clonar proyecto objetivo
      #################################################################

      - name: Clone Target Repository
        run: |
          git clone \
            -b "${{ github.event.inputs.branch }}" \
            "${{ github.event.inputs.repo_url }}" \
            project

          echo "Repositorio clonado"
          ls -la project

      #################################################################
      # Setup Java
      #################################################################

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      #################################################################
      # Cache Maven
      #################################################################

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}

      #################################################################
      # Guardar Curl
      #################################################################

      - name: Save Curl Request
        run: |
          cat <<'EOF' > curl_input.txt
          ${{ github.event.inputs.curl_request }}
          EOF

      #################################################################
      # Compilar Generador
      #################################################################

      - name: Compile Generator
        working-directory: ./project
        run: |
          mkdir -p .github/scripts/out

          javac \
            .github/scripts/GenerateFeature.java \
            -d .github/scripts/out

      #################################################################
      # Generar Tests Karate
      #################################################################

      - name: Generate Karate Tests
        id: generate
        working-directory: ./project
        run: |

          OUTPUT=$(java \
            -cp .github/scripts/out \
            GenerateFeature \
            --curl-file ../curl_input.txt)

          echo "$OUTPUT"

          FOLDER=$(echo "$OUTPUT" | grep -oP "(?<=Estructura generada para ')[^']+" | head -1)

          if [ -z "$FOLDER" ]; then
            FOLDER="endpoint"
          fi

          echo "folder_name=$FOLDER" >> "$GITHUB_OUTPUT"

          echo "Folder generado: $FOLDER"

      #################################################################
      # Mostrar Archivos Generados
      #################################################################

      - name: Show Generated Files
        working-directory: ./project
        run: |
          find src/test -type f || true

      #################################################################
      # Ejecutar Karate
      #################################################################

      - name: Run Karate Tests
        if: ${{ github.event.inputs.run_tests }}
        working-directory: ./project
        continue-on-error: true
        run: |

          TAG="@${{ steps.generate.outputs.folder_name }}Services"

          echo "Ejecutando tag $TAG"

          mvn clean test \
            "-Dkarate.options=--tags $TAG" \
            "-Dkarate.env=${{ github.event.inputs.karate_env }}" \
            --no-transfer-progress

      #################################################################
      # Upload Allure
      #################################################################

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: project/target/allure-results
          if-no-files-found: warn

      #################################################################
      # Upload Surefire
      #################################################################

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: project/target/surefire-reports
          if-no-files-found: warn

      #################################################################
      # Crear Rama
      #################################################################

      - name: Create Automation Branch
        if: ${{ github.event.inputs.commit_results }}
        id: branch
        working-directory: ./project
        run: |

          BRANCH_NAME="auto/karate-${{ github.run_number }}"

          git checkout -b "$BRANCH_NAME"

          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

      #################################################################
      # Commit
      #################################################################

      - name: Commit Generated Tests
        if: ${{ github.event.inputs.commit_results }}
        working-directory: ./project
        run: |

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No hay cambios para commitear"
            exit 0
          fi

          git commit -m "feat(karate): auto-generated tests"

      #################################################################
      # Push
      #################################################################

      - name: Push Branch
        if: ${{ github.event.inputs.commit_results }}
        working-directory: ./project
        run: |

          git push origin \
            "${{ steps.branch.outputs.branch_name }}"

      #################################################################
      # Resumen
      #################################################################

      - name: Summary
        run: |
          echo "========================================"
          echo "Repositorio: ${{ github.event.inputs.repo_url }}"
          echo "Branch origen: ${{ github.event.inputs.branch }}"
          echo "Branch creada: auto/karate-${{ github.run_number }}"
          echo "Ambiente: ${{ github.event.inputs.karate_env }}"
          echo "========================================"
