name: Karate Feature Generator & Runner

run-name: Karate Generator - ${{ github.event.inputs.branch }}

on:
  workflow_dispatch:
    inputs:
      repo_name:
        description: 'Repositorio destino (org/repo)'
        required: true
        default: 'mi-org/mi-repo'

      branch:
        description: 'Branch origen'
        required: true
        default: 'main'

      curl_request:
        description: 'Curl o request Postman'
        required: true

      karate_env:
        description: 'Ambiente'
        required: true
        default: 'qa'

      run_tests:
        description: 'Ejecutar pruebas'
        required: true
        default: true
        type: boolean

      commit_results:
        description: 'Commit y Push'
        required: true
        default: true
        type: boolean

jobs:
  generate-and-run:
    runs-on: ubuntu-latest

    steps:

      ###########################################################
      # Checkout repo pipeline
      ###########################################################

      - name: Checkout Pipeline Repository
        uses: actions/checkout@v4
        with:
          path: pipeline

      ###########################################################
      # Checkout repositorio destino
      ###########################################################

      - name: Checkout Target Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.repo_name }}
          ref: ${{ github.event.inputs.branch }}
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0
          path: project

      ###########################################################
      # JAVA
      ###########################################################

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      ###########################################################
      # CACHE MAVEN
      ###########################################################

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ runner.os }}-${{ hashFiles('project/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}

      ###########################################################
      # GUARDAR CURL
      ###########################################################

      - name: Save Curl
        run: |
          cat <<'EOF' > curl_input.txt
          ${{ github.event.inputs.curl_request }}
          EOF

      ###########################################################
      # COMPILAR GENERADOR
      ###########################################################

      - name: Compile Generator
        working-directory: ./project
        run: |
          mkdir -p .github/scripts/out

          javac \
            .github/scripts/GenerateFeature.java \
            -d .github/scripts/out

      ###########################################################
      # GENERAR TESTS
      ###########################################################

      - name: Generate Karate Tests
        id: generate
        working-directory: ./project
        run: |

          OUTPUT=$(java \
            -cp .github/scripts/out \
            GenerateFeature \
            --curl-file ../curl_input.txt)

          echo "$OUTPUT"

          FOLDER=$(echo "$OUTPUT" \
            | grep -oP "(?<=Estructura generada para ')[^']+" \
            | head -1)

          if [ -z "$FOLDER" ]; then
            FOLDER="endpoint"
          fi

          echo "folder_name=$FOLDER" >> "$GITHUB_OUTPUT"

      ###########################################################
      # VALIDAR ARCHIVOS
      ###########################################################

      - name: Show Generated Files
        working-directory: ./project
        run: |
          find src/test -type f || true

      ###########################################################
      # EJECUTAR PRUEBAS
      ###########################################################

      - name: Run Karate Tests
        if: ${{ github.event.inputs.run_tests }}
        working-directory: ./project
        continue-on-error: true
        run: |

          TAG="@${{ steps.generate.outputs.folder_name }}Services"

          mvn clean test \
            "-Dkarate.options=--tags $TAG" \
            "-Dkarate.env=${{ github.event.inputs.karate_env }}"

      ###########################################################
      # ARTIFACTS
      ###########################################################

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: project/target/allure-results
          if-no-files-found: warn

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: project/target/surefire-reports
          if-no-files-found: warn

      ###########################################################
      # RAMA AUTOMÁTICA
      ###########################################################

      - name: Create Branch
        if: ${{ github.event.inputs.commit_results }}
        id: branch
        working-directory: ./project
        run: |

          BRANCH_NAME="auto/karate-${{ github.run_number }}"

          git checkout -b "$BRANCH_NAME"

          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

      ###########################################################
      # COMMIT
      ###########################################################

      - name: Commit Changes
        if: ${{ github.event.inputs.commit_results }}
        working-directory: ./project
        run: |

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "feat(karate): auto-generated tests"

      ###########################################################
      # PUSH
      ###########################################################

      - name: Push Branch
        if: ${{ github.event.inputs.commit_results }}
        working-directory: ./project
        run: |
          git push \
            --set-upstream origin \
            "${{ steps.branch.outputs.branch_name }}"

      ###########################################################
      # RESUMEN
      ###########################################################

      - name: Summary
        run: |
          echo "Repositorio : ${{ github.event.inputs.repo_name }}"
          echo "Branch origen : ${{ github.event.inputs.branch }}"
          echo "Branch creada : auto/karate-${{ github.run_number }}"
